version: "3.8"

services:

  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: finai_db
    environment:
      POSTGRES_DB: finai_db
      POSTGRES_USER: finai_user
      POSTGRES_PASSWORD: Fin_AI_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finai_user -d finai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: finai_backend
    environment:
      DATABASE_URL: postgresql://finai_user:Fin_AI_2026@db/finai_db
      SECRET_KEY: supersecretkey-change-this-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # React Frontend
  frontend:
    build: ./finance-dashboard
    container_name: finai_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./finance-dashboard:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
