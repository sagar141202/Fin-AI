name: Fin-AI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ─── Backend Tests ────────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Create test env file
        run: |
          cd backend
          echo "DATABASE_URL=sqlite:///./test.db" > .env
          echo "SECRET_KEY=test-secret-key-for-ci-only" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env
          echo "ANTHROPIC_API_KEY=test-key" >> .env

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  # ─── Frontend Lint ────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: finance-dashboard/package-lock.json

      - name: Install dependencies
        run: |
          cd finance-dashboard
          npm ci

      - name: Run ESLint
        run: |
          cd finance-dashboard
          npm run lint

  # ─── Docker Build Check ───────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker build ./backend -t finai-backend:test

      - name: Build frontend Docker image
        run: |
          docker build ./finance-dashboard -t finai-frontend:test

  # ─── Success notification ─────────────────────────────────
  notify-success:
    name: Pipeline Success
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint, docker-build]
    if: success()

    steps:
      - name: Success
        run: echo "✅ All checks passed! Ready to merge."
